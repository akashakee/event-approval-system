<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Proposal - Proposal System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="faculty-review">
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <div class="brand-icon" style="background:var(--color-heading); color:white;">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>
                Event Proposal System
            </div>
            <div class="nav-user flex-gap">
                <span class="user-badge" style="background:#1E293B; padding: 4px 10px; border-radius:6px; color:white; font-size:12px; font-weight:600;">FACULTY</span>
                <span id="userEmail" class="font-weight-500"></span>
                <button id="logoutBtn" class="btn btn-secondary btn-sm ml-10">Logout</button>
            </div>
        </div>
    </nav>
    <main class="container mt-30">
        <div class="mb-20">
            <a href="faculty.html" class="back-link">
                <svg class="icon" style="width:16px; height:16px;" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Back to Dashboard
            </a>
        </div>
        
        <div class="card mb-30">
            <div class="flex-between mb-30" style="padding-bottom: 24px; border-bottom: 1px solid var(--color-border);">
                <div>
                    <h2 id="viewTitle" class="mb-10">Proposal Title</h2>
                    <p class="color-gray text-sm">Coordinator: <span id="viewStudent" class="font-weight-500" style="color:var(--color-heading);"></span></p>
                </div>
                <span id="viewStatus" class="badge">Status</span>
            </div>
            
            <div class="details-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:24px; margin-bottom: 30px;">
                <div class="details-box">
                    <p class="color-gray text-sm mb-10" style="display:flex; align-items:center; gap:6px;">
                        <svg class="icon" style="width:16px; height:16px;" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        Event Date
                    </p>
                    <p id="viewDate" class="font-weight-600" style="font-size: 1.125rem;"></p>
                </div>
                <div class="details-box">
                    <p class="color-gray text-sm mb-10" style="display:flex; align-items:center; gap:6px;">
                        <svg class="icon" style="width:16px; height:16px;" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                        Venue Configuration
                    </p>
                    <p id="viewVenue" class="font-weight-600" style="font-size: 1.125rem;"></p>
                </div>
            </div>
            
            <div class="mb-30">
                <h3 class="mb-10 text-sm" style="color: var(--color-text-muted); text-transform: uppercase;">Executive Summary</h3>
                <div id="viewDescription" class="details-box" style="font-size: 0.95rem; line-height: 1.7; background: #FFFFFF;"></div>
            </div>
            
            <h3 class="mb-20 text-sm" style="color: var(--color-text-muted); text-transform: uppercase;">Budget Breakdown</h3>
            <div class="table-container">
                <table class="w-100">
                    <thead>
                        <tr>
                            <th>Resource / Item</th>
                            <th>Quantity</th>
                            <th>Unit Price</th>
                            <th>Subtotal</th>
                        </tr>
                    </thead>
                    <tbody id="viewBudgetItems"></tbody>
                    <tfoot>
                        <tr class="total-row">
                            <td colspan="3" class="text-right font-weight-600" style="text-transform: uppercase; font-size: 0.8125rem; color: var(--color-text-muted); letter-spacing: 0.05em;">Total Budget Required</td>
                            <td id="viewTotalBudget" class="font-size-lg item-total"></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <div id="reviewActionSection" class="card" style="background: #F8FAFC; border: 1px solid var(--color-border-input);">
            <h3 class="mb-20" style="display:flex; align-items:center; gap:8px;">
                <svg class="icon" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Faculty Decision Matrix
            </h3>
            <div class="form-group mb-20">
                <label>Review Remarks <span style="font-weight:400; color:var(--color-text-muted);">(Mandatory if rejecting)</span></label>
                <textarea id="reviewRemarks" rows="4" placeholder="Enter structured feedback, suggestions, or technical reasons for rejection here..." style="background: white;"></textarea>
            </div>
            <div class="flex-gap pt-20" style="border-top: 1px solid rgba(0,0,0,0.05);">
                <button id="approveBtn" class="btn btn-success flex-1" style="padding: 14px;">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    Approve Configuration
                </button>
                <button id="rejectBtn" class="btn btn-danger flex-1" style="padding: 14px; background: transparent; border: 1px solid var(--color-danger); color: var(--color-danger);">
                    <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                    Reject Proposal
                </button>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
